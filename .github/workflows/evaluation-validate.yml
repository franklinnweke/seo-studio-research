name: Evaluation Validation

on:
  pull_request:
    paths:
      - "evaluation/**"
      - "docs/publication/**"
      - "docs/publication-research-architecture.md"
      - ".github/workflows/evaluation-validate.yml"
  push:
    branches:
      - main
    paths:
      - "evaluation/**"
      - "docs/publication/**"
      - "docs/publication-research-architecture.md"
      - ".github/workflows/evaluation-validate.yml"

permissions:
  contents: read

concurrency:
  group: evaluation-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Offline research validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: evaluation/pyproject.toml
      - name: Install evaluation package and test runner
        run: python -m pip install -e . pytest
        working-directory: evaluation
      - name: Run evaluation tests
        run: python -m pytest -q
        working-directory: evaluation
      - name: Regenerate JSON schemas
        run: python scripts/export_schemas.py
        working-directory: evaluation
      - name: Reject schema drift
        run: git diff --exit-code -- evaluation/schemas
      - name: Validate licensed pilot evidence offline
        run: python -m seo_studio_eval preflight --config configs/pilot.toml
        working-directory: evaluation
