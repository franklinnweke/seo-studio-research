name: Deploy To Staging

on:
  push:
    branches: [ "staging" ]

env:
  SERVER_HOST: suiteonix.com
  FRONTEND__IMAGE_NAME: frontend
  BACKEND__IMAGE_NAME: backend

jobs:
  deploy_frontend_and_backend:
    name: Build, Push And Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: run Image on Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{env.SERVER_HOST}}
          username: davneet
          password: ${{secrets.SSH_PRIVATE_KEY}}
          #          key: ${{secrets.SSH_PRIVATE_KEY}}
          port: 99
          script: |-
            sudo docker run -d  -p 81:80 --restart unless-stopped --name ${{env.FRONTEND__IMAGE_NAME}} ${{env.FRONTEND__IMAGE_NAME}}