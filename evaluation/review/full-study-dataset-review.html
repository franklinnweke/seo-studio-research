<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEO Studio — Full-study dataset review</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211b;
      --muted: #667069;
      --line: #d8ddd9;
      --paper: #f5f6f3;
      --surface: #ffffff;
      --accent: #196947;
      --accent-soft: #dcece4;
      --danger: #a63a32;
      --header: 72px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font: 15px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    .topbar {
      height: var(--header);
      display: grid;
      grid-template-columns: minmax(250px, 1fr) minmax(280px, 520px) auto;
      align-items: center;
      gap: 28px;
      padding: 0 28px;
      background: rgba(255,255,255,.94);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark { width: 30px; height: 30px; color: var(--accent); flex: 0 0 auto; }
    .brand strong { display: block; font-size: 15px; letter-spacing: -.01em; }
    .brand span { color: var(--muted); font-size: 12px; }
    .progress-wrap { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; }
    .progress-wrap span { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .track { height: 6px; border-radius: 999px; overflow: hidden; background: #e6e9e6; }
    .fill { height: 100%; width: 0; background: var(--accent); transition: width .28s ease; }
    .actions { display: flex; gap: 8px; }
    .button {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }
    .button:hover { border-color: #a9b3ac; transform: translateY(-1px); }
    .button.primary { border-color: var(--accent); background: var(--accent); color: white; }
    .button svg { width: 16px; height: 16px; }
    .workspace {
      min-height: calc(100svh - var(--header));
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(390px, .75fr);
    }
    .visual-stage {
      min-width: 0;
      padding: 28px;
      display: grid;
      grid-template-rows: minmax(420px, 1fr) auto;
      gap: 18px;
      border-right: 1px solid var(--line);
    }
    .image-plane {
      min-height: 0;
      background: #1d211f;
      border-radius: 12px;
      overflow: hidden;
      display: grid;
      place-items: center;
      position: relative;
    }
    .image-plane img {
      width: 100%;
      height: 100%;
      max-height: calc(100svh - 230px);
      object-fit: contain;
      animation: imageIn .26s ease both;
    }
    @keyframes imageIn { from { opacity: .25; transform: scale(.992); } to { opacity: 1; transform: scale(1); } }
    .image-index {
      position: absolute;
      left: 14px;
      top: 14px;
      padding: 6px 9px;
      border-radius: 7px;
      background: rgba(15,18,16,.72);
      color: white;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .source-block { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start; }
    .source-block h1 { margin: 0 0 5px; font-size: clamp(20px, 2vw, 30px); letter-spacing: -.035em; line-height: 1.15; }
    .source-block p { margin: 0; color: var(--muted); max-width: 78ch; }
    .source-link { color: var(--accent); text-decoration: none; border-bottom: 1px solid currentColor; white-space: nowrap; }
    .inspector {
      min-width: 0;
      background: var(--surface);
      padding: 26px 28px 120px;
      overflow-y: auto;
      max-height: calc(100svh - var(--header));
    }
    .eyebrow { color: var(--accent); text-transform: uppercase; letter-spacing: .1em; font-weight: 700; font-size: 11px; }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 24px; }
    .meta-row span { border-bottom: 1px solid var(--line); padding: 2px 0; color: var(--muted); font-size: 12px; }
    fieldset { margin: 0 0 24px; padding: 0; border: 0; }
    legend, label.heading { display: block; margin: 0 0 8px; font-weight: 700; font-size: 13px; }
    .hint { margin: -2px 0 9px; color: var(--muted); font-size: 12px; }
    textarea {
      width: 100%;
      min-height: 112px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fbfcfa;
      outline: none;
      transition: border-color .16s, box-shadow .16s;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .choice-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .choice input { position: absolute; opacity: 0; pointer-events: none; }
    .choice label {
      min-height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-weight: 700;
      transition: .16s ease;
    }
    .choice input:checked + label { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
    .choice.reject input:checked + label { border-color: var(--danger); background: #f8e5e3; color: var(--danger); }
    .checks { display: grid; gap: 10px; }
    .check { display: grid; grid-template-columns: 18px 1fr; gap: 9px; align-items: start; color: #374039; }
    .check input { width: 17px; height: 17px; accent-color: var(--accent); margin-top: 2px; }
    .footer-nav {
      position: fixed;
      right: 0;
      bottom: 0;
      width: min(100%, calc(100% / 2.2));
      min-width: 390px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: rgba(255,255,255,.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .save-state { text-align: center; color: var(--muted); font-size: 12px; }
    .save-state.error { color: var(--danger); }
    .empty { padding: 80px 28px; max-width: 620px; margin: auto; }
    .empty h1 { font-size: 34px; letter-spacing: -.04em; }
    .empty code { background: #e8ebe8; padding: 2px 5px; border-radius: 4px; }
    @media (max-width: 900px) {
      :root { --header: auto; }
      .topbar { grid-template-columns: 1fr auto; padding: 14px 18px; gap: 14px; }
      .progress-wrap { grid-column: 1 / -1; grid-row: 2; }
      .workspace { display: block; }
      .visual-stage { border-right: 0; border-bottom: 1px solid var(--line); padding: 18px; }
      .image-plane { min-height: 52svh; }
      .image-plane img { max-height: 62svh; }
      .inspector { max-height: none; padding: 24px 18px 100px; }
      .footer-nav { width: 100%; min-width: 0; padding: 12px 18px; }
      .source-block { display: block; }
      .source-link { display: inline-block; margin-top: 10px; }
    }
    @media (max-width: 520px) {
      .topbar { padding: 12px 14px; gap: 10px; }
      .brand { gap: 8px; }
      .mark { width: 26px; height: 26px; }
      .brand strong { font-size: 13px; }
      .brand span { font-size: 11px; }
      .actions { gap: 6px; }
      .actions .button { min-height: 36px; padding: 7px 10px; }
      #exportButton span { display: none; }
      #exportButton svg { width: 18px; height: 18px; }
      .visual-stage { grid-template-rows: auto auto; }
      .image-plane { min-height: 440px; }
      .image-plane img { height: auto; max-height: 62svh; }
      .source-block h1 { overflow-wrap: anywhere; }
      .footer-nav { grid-template-columns: 1fr 1fr; gap: 8px; padding: 9px 14px; }
      .save-state { grid-column: 1 / -1; grid-row: 1; }
      .footer-nav .button { justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M5 9.5 16 3l11 6.5v13L16 29 5 22.5v-13Z" stroke="currentColor" stroke-width="2"/><path d="m10 18 4-4 3 3 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div><strong>SEO Studio research</strong><span>Full-study dataset review</span></div>
    </div>
    <div class="progress-wrap">
      <span id="doneCount">0 reviewed</span>
      <div class="track"><div class="fill" id="progressFill"></div></div>
      <span id="remainingCount">128 remaining</span>
    </div>
    <div class="actions">
      <button class="button" id="importButton" type="button">Import</button>
      <button class="button primary" id="exportButton" type="button" aria-label="Export review as JSONL">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Export JSONL</span>
      </button>
      <input id="importFile" type="file" accept=".jsonl,.json" hidden>
    </div>
  </header>
  <main id="app"></main>
  <script>
    const SOURCE = "../dataset/full-study-human-review.jsonl";
    const STORAGE_KEY = "seo-studio-full-study-review-v1";
    const state = { items: [], index: 0, responses: {} };
    const app = document.getElementById("app");

    function lines(value) { return (value || "").split("\n").map(v => v.trim()).filter(Boolean); }
    function responseFor(item) {
      return state.responses[item.candidate_id] || {
        ...item,
        human_decision: "pending",
        purpose_fit_confirmed: false,
        privacy_and_sensitivity_checked: false,
        duplicate_and_quality_checked: false,
        source_and_license_checked: false,
        reference_visible_facts: [],
        forbidden_claims_additions: [],
        adjudication_alt_examples: [],
        human_notes: ""
      };
    }
    function isComplete(r) {
      if (r.human_decision === "rejected") return Boolean(r.human_notes.trim());
      if (r.human_decision !== "accepted") return false;
      const altOkay = ["decorative", "redundant"].includes(r.purpose) || r.adjudication_alt_examples.length > 0;
      return r.purpose_fit_confirmed && r.privacy_and_sensitivity_checked && r.duplicate_and_quality_checked && r.source_and_license_checked && r.reference_visible_facts.length > 0 && altOkay;
    }
    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ responses: state.responses, index: state.index }));
      updateProgress();
    }
    function updateProgress() {
      const completed = state.items.filter(item => isComplete(responseFor(item))).length;
      document.getElementById("doneCount").textContent = `${completed} reviewed`;
      document.getElementById("remainingCount").textContent = `${state.items.length - completed} remaining`;
      document.getElementById("progressFill").style.width = `${state.items.length ? completed / state.items.length * 100 : 0}%`;
    }
    function saveCurrent() {
      const item = state.items[state.index];
      if (!item || !document.getElementById("facts")) return;
      const response = responseFor(item);
      response.human_decision = document.querySelector('input[name="decision"]:checked')?.value || "pending";
      response.purpose_fit_confirmed = document.getElementById("purposeFit").checked;
      response.privacy_and_sensitivity_checked = document.getElementById("privacyCheck").checked;
      response.duplicate_and_quality_checked = document.getElementById("qualityCheck").checked;
      response.source_and_license_checked = document.getElementById("sourceCheck").checked;
      response.reference_visible_facts = lines(document.getElementById("facts").value);
      response.forbidden_claims_additions = lines(document.getElementById("forbidden").value);
      response.adjudication_alt_examples = lines(document.getElementById("altExamples").value);
      response.human_notes = document.getElementById("notes").value.trim();
      state.responses[item.candidate_id] = response;
      persist();
      const save = document.getElementById("saveState");
      save.textContent = isComplete(response) ? "Complete · saved locally" : "Draft saved locally";
      save.classList.toggle("error", !isComplete(response));
    }
    function navigate(delta) {
      saveCurrent();
      state.index = Math.max(0, Math.min(state.items.length - 1, state.index + delta));
      persist();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function render() {
      const item = state.items[state.index];
      if (!item) return;
      const r = responseFor(item);
      const imagePath = `../${item.thumbnail_path}`;
      app.innerHTML = `
        <div class="workspace">
          <section class="visual-stage">
            <div class="image-plane"><img src="${imagePath}" alt="Candidate under review"><span class="image-index">${state.index + 1} / ${state.items.length}</span></div>
            <div class="source-block"><div><h1>${escapeHtml(item.source_title)}</h1><p>${escapeHtml(item.description)}</p></div><a class="source-link" href="${item.source_url}" target="_blank" rel="noreferrer">Open Commons source</a></div>
          </section>
          <aside class="inspector">
            <span class="eyebrow">${escapeHtml(item.candidate_id)}</span>
            <div class="meta-row"><span>${escapeHtml(item.domain)}</span><span>${escapeHtml(item.purpose)}</span></div>
            <fieldset><legend>Human decision</legend><div class="choice-row"><div class="choice"><input id="accept" name="decision" type="radio" value="accepted" ${r.human_decision === "accepted" ? "checked" : ""}><label for="accept">Accept item</label></div><div class="choice reject"><input id="reject" name="decision" type="radio" value="rejected" ${r.human_decision === "rejected" ? "checked" : ""}><label for="reject">Reject item</label></div></div></fieldset>
            <fieldset><label class="heading" for="facts">Atomic visible facts</label><p class="hint">One independently judgeable proposition per line. Record only what the image visibly supports.</p><textarea id="facts" placeholder="A person stands behind a counter.\nPackaged products are arranged on shelves.">${escapeHtml(r.reference_visible_facts.join("\n"))}</textarea></fieldset>
            <fieldset><label class="heading" for="forbidden">Additional forbidden claims</label><p class="hint">One tempting but unsupported or sensitive claim per line.</p><textarea id="forbidden" placeholder="The person owns the business.\nThe products are locally made.">${escapeHtml(r.forbidden_claims_additions.join("\n"))}</textarea></fieldset>
            <fieldset><label class="heading" for="altExamples">Adjudication alt examples</label><p class="hint">One defensible example per line. Decorative and redundant placements may remain empty.</p><textarea id="altExamples">${escapeHtml(r.adjudication_alt_examples.join("\n"))}</textarea></fieldset>
            <fieldset><legend>Required checks</legend><div class="checks"><label class="check"><input id="purposeFit" type="checkbox" ${r.purpose_fit_confirmed ? "checked" : ""}><span>The frozen purpose fits this fictional placement.</span></label><label class="check"><input id="privacyCheck" type="checkbox" ${r.privacy_and_sensitivity_checked ? "checked" : ""}><span>No unacceptable private, graphic, sensitive, or identifying detail.</span></label><label class="check"><input id="qualityCheck" type="checkbox" ${r.duplicate_and_quality_checked ? "checked" : ""}><span>No watermark, corruption, material duplicate, or unusable crop.</span></label><label class="check"><input id="sourceCheck" type="checkbox" ${r.source_and_license_checked ? "checked" : ""}><span>The displayed item matches its Commons source and licence evidence.</span></label></div></fieldset>
            <fieldset><label class="heading" for="notes">Review notes</label><textarea id="notes" placeholder="Explain any ambiguity, rejection, or special adjudication boundary.">${escapeHtml(r.human_notes)}</textarea></fieldset>
          </aside>
        </div>
        <nav class="footer-nav"><button class="button" id="previous" type="button" ${state.index === 0 ? "disabled" : ""}>← Previous</button><span class="save-state ${isComplete(r) ? "" : "error"}" id="saveState">${isComplete(r) ? "Complete · saved locally" : "Incomplete · changes save locally"}</span><button class="button primary" id="next" type="button">${state.index === state.items.length - 1 ? "Save item" : "Save & next →"}</button></nav>`;
      document.getElementById("previous").onclick = () => navigate(-1);
      document.getElementById("next").onclick = () => state.index === state.items.length - 1 ? saveCurrent() : navigate(1);
      app.querySelectorAll("input, textarea").forEach(el => el.addEventListener("change", saveCurrent));
      updateProgress();
    }
    function escapeHtml(value = "") { return String(value).replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])); }
    function exportReview() {
      saveCurrent();
      const records = state.items.map(responseFor);
      const blob = new Blob([records.map(row => JSON.stringify(row)).join("\n") + "\n"], { type: "application/x-ndjson" });
      const link = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: "full-study-human-review-completed.jsonl" });
      link.click();
      URL.revokeObjectURL(link.href);
    }
    async function importReview(file) {
      const records = (await file.text()).split(/\r?\n/).filter(Boolean).map(JSON.parse);
      const known = new Set(state.items.map(item => item.candidate_id));
      if (records.some(row => !known.has(row.candidate_id))) throw new Error("Import contains an unknown candidate_id");
      records.forEach(row => { state.responses[row.candidate_id] = row; });
      persist(); render();
    }
    async function boot() {
      try {
        const response = await fetch(SOURCE);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.items = (await response.text()).split(/\r?\n/).filter(Boolean).map(JSON.parse);
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        state.responses = saved.responses || {};
        state.index = Math.min(saved.index || 0, state.items.length - 1);
        render();
      } catch (error) {
        app.innerHTML = `<section class="empty"><span class="eyebrow">Reviewer setup</span><h1>Serve the evaluation directory locally.</h1><p>The browser could not load <code>${SOURCE}</code>. From <code>evaluation/</code>, run <code>python3 -m http.server 8765</code>, then open <code>http://127.0.0.1:8765/review/full-study-dataset-review.html</code>.</p><p>${escapeHtml(error.message)}</p></section>`;
      }
    }
    document.getElementById("exportButton").onclick = exportReview;
    document.getElementById("importButton").onclick = () => document.getElementById("importFile").click();
    document.getElementById("importFile").onchange = event => importReview(event.target.files[0]).catch(error => alert(error.message));
    document.addEventListener("keydown", event => {
      if (event.target.matches("textarea, input")) return;
      if (event.key === "ArrowLeft") navigate(-1);
      if (event.key === "ArrowRight") navigate(1);
    });
    boot();
  </script>
</body>
</html>
